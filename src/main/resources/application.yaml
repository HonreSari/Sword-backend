spring:
  application:
    name: Jain-Lai-backend
  datasource:
    url: jdbc:mysql://localhost:3306/sword_of_coming?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: admin
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  # --- CORRECTION START ---
  data:
    redis:
      host: localhost
      port: 6379
      # password: your_password 
  # --- CORRECTION END ---
  cache:
    type: simple 
    redis:
      time-to-live: 1800000 # 30 minutes in milliseconds
      cache-null-values: false # Good practice to avoid caching nulls

server:
  port: 8080
